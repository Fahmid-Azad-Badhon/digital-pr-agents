name: dashboard-ci

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Verify CI Guardrails
        run: npm run verify:ci

  release-gates:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Production Externalization Contract
        run: npm run verify:integration-contract-smoke

      - name: Build Artifact
        run: npm run build
